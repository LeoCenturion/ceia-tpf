[loggers]
keys=root,autogluon,src_modeling,src_backtesting,src

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler,fileHandler

[logger_autogluon]
level=WARNING
handlers=consoleHandler,fileHandler
qualname=autogluon
propagate=0

[logger_src_modeling]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=src.modeling
propagate=0

[logger_src_backtesting]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.backtesting
propagate=0

[logger_src]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=simpleFormatter
args=('app.log','a')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
